{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <div class="card">
    <div class="card-body">
      <p class="auth-title">계정 설정</p>
      <p class="auth-subtitle">비밀번호를 변경합니다</p>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
              <div class="alert-danger mt-2">{{ field.errors.0 }}</div>
            {% endif %}
          </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-dark">변경</button>
          <button type="button" onclick="history.back()" class="btn btn-outline-secondary">취소</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
