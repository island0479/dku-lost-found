<div id="inquiry-display-{{ inq.pk }}">
  <form hx-post="{% url 'inquiry_save' item.pk inq.pk %}"
        hx-target="#inquiry-display-{{ inq.pk }}"
        hx-swap="outerHTML">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">문의 내용</label>
      <textarea name="message" class="form-control" rows="3" required>{{ inq.message }}</textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">연락처</label>
      <input name="contact" type="text" class="form-control" value="{{ inq.contact }}" required>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-dark btn-sm">저장</button>
      <button type="button" class="btn btn-sm btn-outline-secondary"
              hx-get="{% url 'inquiry_display' item.pk inq.pk %}"
              hx-target="#inquiry-display-{{ inq.pk }}"
              hx-swap="outerHTML">
        취소
      </button>
    </div>
  </form>
</div>
