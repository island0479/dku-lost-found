{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="page-title mb-0">분실물 목록</h4>
  <span class="text-muted small" id="item-count">{{ items|length }}건</span>
</div>

<div class="search-bar">
  <form id="search-form"
        hx-get="{% url 'item_list' %}"
        hx-target="#item-results"
        hx-swap="innerHTML"
        hx-trigger="submit, change from:[name='category'], change from:[name='show_all']">
    <div class="d-flex gap-2 align-items-center flex-wrap">
      <div class="position-relative" style="flex:0 0 300px">
        <i class="bi bi-search position-absolute"
           style="left:13px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.85rem;pointer-events:none"></i>
        <input id="q-input" name="q" value="{{ q }}" class="form-control" style="padding-left:36px"
               hx-get="{% url 'item_list' %}"
               hx-trigger="keyup changed delay:300ms"
               hx-target="#item-results"
               hx-swap="innerHTML"
               hx-include="#search-form">
      </div>
      <button type="submit" class="btn btn-dark" style="flex:0 0 90px">검색</button>
      <select name="category" class="form-select" style="flex:0 0 180px;margin-left:auto">
        <option value="">전체 카테고리</option>
        {% for cat in categories %}
          <option value="{{ cat.id }}" {% if selected_category == cat.id|stringformat:"s" %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
      </select>
      <label id="show-all-label" class="search-toggle {% if show_all %}active{% endif %}" style="flex:0 0 210px;justify-content:center">
        <input type="checkbox" name="show_all" value="1" id="show-all-cb" hidden {% if show_all %}checked{% endif %}>
        반환 완료 분실물도 보기
      </label>
    </div>
  </form>
</div>

<div id="item-results">
  {% include "items/partials/item_cards.html" %}
</div>

<script>
  document.getElementById('show-all-cb').addEventListener('change', function() {
    document.getElementById('show-all-label').classList.toggle('active', this.checked);
  });
</script>
{% endblock %}
