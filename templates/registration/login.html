{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <div class="card">
    <div class="card-body">
      <p class="auth-title">로그인</p>
      <p class="auth-subtitle">DKU 분실물 센터에 오신 걸 환영합니다</p>
      {% if form.errors %}
        <div class="alert-danger mb-3">아이디 또는 비밀번호가 올바르지 않습니다.</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="mb-3">
          <label class="form-label">아이디</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label">비밀번호</label>
          <input type="password" name="password" class="form-control" required
                 onkeydown="if(event.key==='Enter'){event.preventDefault();this.form.submit()}">
        </div>
        <button type="submit" class="btn btn-dark w-100">로그인</button>
      </form>
      <p class="text-center mt-3 mb-0" style="font-size:0.875rem;color:var(--text-muted)">
        계정이 없으신가요? <a href="{% url 'signup' %}" style="color:var(--brand)">회원가입</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
